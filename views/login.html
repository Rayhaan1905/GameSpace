<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Login | Gaming Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: url('public\images\dj ll.jpg') no-repeat center center fixed; /* Add your background image URL */
      background-size: cover;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
     
    }

    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .login-box {
      background: rgba(0, 0, 0, 0.5); /* Make the background transparent */
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 400px;
      position: relative;
      backdrop-filter: blur(10px); /* Add a blur effect to the container */
    }

    h2 {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8); /* Semi-transparent input background */
      color: #333;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #f9d423;
      outline: none;
      box-shadow: 0 0 8px rgba(249, 212, 35, 0.8);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f9d423;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #ff4e50;
    }

    #errorMessage {
      color: #ff4e50;
      text-align: center;
      font-size: 1rem;
    }

    p {
      text-align: center;
      margin-top: 20px;
    }

    a {
      color: #f9d423;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      color: #ff4e50;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .login-box {
        padding: 30px;
      }

      h2 {
        font-size: 1.5rem;
      }

      input,
      button {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2>Login</h2>
      <form id="loginForm">
        <div class="input-group">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="input-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
        <p id="errorMessage"></p>
        <p>Don't have an account? <a href="/registration">Sign up</a></p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (event) {
      event.preventDefault();
      
      let username = document.getElementById("username").value;
      let password = document.getElementById("password").value;
      let errorMessage = document.getElementById("errorMessage");

      if (username === "" || password === "") {
        errorMessage.textContent = "Both fields are required!";
        return;
      }

      fetch('/backend/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(response => response.json())
      .then(data => {
        if (data.ok) {
          window.location.href = "/";
        } else {
          errorMessage.textContent = "Invalid username or password!";
        }
      })
      .catch(error => {
        errorMessage.textContent = "An error occurred. Please try again.";
      });
    });
  </script>
</body>
</html>
