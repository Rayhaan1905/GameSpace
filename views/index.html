<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Game Space</title>
    <style>
        /* General reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body & Background */
        body {
            font-family: 'Arial', sans-serif;
            color: #f1f1f1;
            overflow-x: hidden; /* Prevent horizontal scrolling */
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Overlay for better readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent overlay */
            z-index: 0;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: rgba(0, 0, 0, 0.8); /* Semi-transparent header */
            z-index: 1; /* Keep header on top */
        }

        header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .logo img {
            width: 50px;
            height: 50px;
            transition: transform 0.3s ease;
        }

        header .logo img:hover {
            animation: bounce 0.5s ease infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        header .logo h1 {
            color: #f1f1f1;
            font-size: 2em;
            font-weight: 700;
        }

        nav ul {
            list-style-type: none;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            text-decoration: none;
            color: #f1f1f1;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #00aaff;
        }

        /* Hero Section */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 150px 70px;
            margin-top: 100px; /* Add space for header */
        }

        .hero h2 {
            font-size: 4.5em;
            margin-bottom: 50px;
        }

        .hero p {   
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .cta-button {
            padding: 10px 30px;
            background-color: #00aaff;
            color: #fff;
            text-decoration: none;
            font-size: 1em;
            border-radius: 10px;
            position: relative;
            transition: transform 0.3s ease, background-color 0.3s ease;
            margin-top: 30px;
        }

        .cta-button::after {
            content: '→'; /* Right arrow */
            font-size: 1.5em;
            position: absolute;
            right: 0px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease;
        }

        .cta-button:hover {
            background-color: #0077cc;
            transform: scale(1.1);
        }

        .cta-button:hover::after {
            transform: translateX(-10px) translateY(-50%); /* Move arrow to the left */
        }

        .cta-button:active {
            transform: scale(0.9);
        }

        /* Games Section */
        .games {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 20px;
            margin-top: 200px; /* Add margin-top to push it below the hero section */
            background-color: #121212;
        }

        .games h2 {
            font-size: 2.5em;
            margin-bottom: 40px;
        }

        .game-cards {
            display: flex;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .game-cards .game-cards-inner {
            display: flex;
            animation: circularScroll 15s linear infinite;
        }

        .game-cards .game-card {
            background-color: rgba(34, 40, 49, 0.9);
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            text-align: center;
            margin-right: 15px;
            flex-shrink: 0;
            transform: scale(1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .game-cards .game-card:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .game-cards .game-card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .game-cards .game-card h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }

        .game-cards .game-card a {
            color: #00aaff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
        }

        .game-cards .game-card a:hover {
            color: #0077cc;
        }

        /* Circular scrolling animation */
        @keyframes circularScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }
    </style>
</head>

<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop>
            <source src="\videos\videoplayback.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="/images/image1_0.jpg" alt="Game Space Logo">
            <h1>Game Space</h1>
        </div>
        <nav>
            <ul>
                <li><a href="/about">About</a></li>
                <li><a href="#games">Games</a></li>
                <li><a href="/registration">Sign Up</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="/login">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Game Space</h2>
            <p>Welcome to the world of exciting games!</p>
        </div>
        <a href="/login" class="cta-button">Start Playing</a>
    </section>

    <!-- Featured Games Section -->
    <section id="games" class="games">
        <h2>Our Featured Games</h2>
        <div class="game-cards">
            <div class="game-cards-inner">
                <div class="game-card">
                    <img src="/images/2048.jpg" alt="2048">
                    <h3>2048</h3>
                    <a href="/login">Play Now</a>
                </div>
                <div class="game-card">
                    <img src="/images/2048.avif" alt="Racing Legends">
                    <h3>Racing Legends</h3>
                    <a href="/login">Play Now</a>
                </div>
                <div class="game-card">
                    <img src="https://via.placeholder.com/250x150" alt="Space Odyssey">
                    <h3>Space Odyssey</h3>
                    <a href="/login">Play Now</a>
                </div>
                <div class="game-card">
                    <img src="https://via.placeholder.com/250x150" alt="Fantasy Quest">
                    <h3>Fantasy Quest</h3>
                    <a href="/login">Play Now</a>
                </div>
                <div class="game-card">
                    <img src="https://via.placeholder.com/250x150" alt="Zombie Survival">
                    <h3>Zombie Survival</h3>
                    <a href="/login">Play Now</a>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
